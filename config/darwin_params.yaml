# Параметры ROS2-драйвера Darwin Simulator (нода darwin_node).
#
# Файл подтягивается launch-файлом launch/darwin_node.launch.py.
# Значения host и port можно переопределить из командной строки:
#   ros2 launch darwin_ros2_api darwin_node.launch.py host:=192.168.0.10 port:=8765
#
# Имя верхнего ключа должно совпадать с именем ноды (darwin_node).
darwin_node:
  ros__parameters:
    # --- Подключение к WebSocket-серверу симулятора ------------------
    host: "127.0.0.1"          # IP/хост симулятора
    port: 8765                 # порт WebSocket API

    # --- Обнаружение потоков / тип робота ---------------------------
    # auto_discover=true: запросить /capabilities и определить
    # доступные телеметрические потоки и тип робота автоматически.
    auto_discover: true
    # Принудительный список потоков (если задан — переопределяет
    # auto_discover). Пример: ["/imu", "/position", "/image/0"].
    streams: []
    # Принудительный тип робота: "" (авто), "Drone" или "ForWdCar".
    robot_type: ""

    # --- Системы координат (frame_id) -------------------------------
    frame_id: "base_link"      # кадр робота (центр дрона: imu, range, odom)
    world_frame_id: "map"      # кадр мировой позиции (/pose)
    laser_frame_id: "laser"    # базовое имя кадра лидара (-> laser_N)

    # --- TF (дефолтная обвязка дерева преобразований) ---------------
    publish_tf: true           # публиковать ли TF
    odom_frame_id: "odom"      # родитель base_link (TF из одометрии)
    laser_z_offset: 0.10       # лидар выше центра дрона, м
    camera_x_offset: 0.10      # камера впереди центра дрона, м

    # --- Одометрия --------------------------------------------------
    # Первая позиция фиксируется как ноль; топик /odom и TF odom->base_link
    # публикуют перемещение относительно точки старта.
    publish_odom: true
    # Конвертация позы из СК симулятора (Unity-стиль, ось вверх Y) в СК ROS
    # REP-103 (ось вверх Z). Без неё вращение по yaw выглядит как pitch.
    convert_sim_to_ros: true

    # --- Параметры лидара (симулятор отдаёт только массив дистанций) -
    laser_angle_min: 0.0       # рад
    laser_angle_max: 6.283185307179586  # рад (2*pi)
    laser_range_min: 0.0       # м
    laser_range_max: 30.0      # м
    # Зеркалирование развёртки (CW симулятора -> CCW ROS). Без него
    # препятствия справа/слева отображаются зеркально.
    laser_reverse: true
    # Доп. угловое смещение развёртки, градусы (выравнивание "вперёд").
    laser_angle_offset: 0.0

    # --- Управление -------------------------------------------------
    # Трактовать cmd_vel.angular.z как град/с (true) или рад/с (false).
    cmd_vel_yaw_is_degrees: false
    # Масштаб скорости для колёсной платформы: cmd_vel (м/с) -> проценты.
    car_speed_scale: 100.0
